x-common: &common
  networks: [akademee]
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    <<: *common
    environment:
      POSTGRES_DB: akademee
      POSTGRES_USER: akademee
      POSTGRES_PASSWORD: ${DB_PASSWORD:-akademee_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akademee"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    <<: *common
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://akademee:${DB_PASSWORD:-akademee_secret}@db:5432/akademee
      DATABASE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@akademee.app}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL_PRODUCTION: ${FRONTEND_URL_PRODUCTION:-https://akademee.cm}
      TENANT_DEV_DOMAIN: ${TENANT_DEV_DOMAIN:-lvh.me}
      TENANT_PROD_DOMAIN: ${TENANT_PROD_DOMAIN:-akademee.cm}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build: ./frontend
    <<: *common
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_logs:

networks:
  akademee:
